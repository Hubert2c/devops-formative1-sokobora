name: CI Pipeline

# - Push to any branch except main
# - Pull requests targeting main
on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-lint:
    name: Lint, Test, and Build Docker Image
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up language environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # 4. Lint - pipeline fails if this step fails
      - name: Lint with flake8
        run: |
          flake8 app tests --max-line-length=100 --show-source

      # 5. Test - pipeline fails on any failing test
      #    Tests use an in-memory SQLite DB (see tests/test_main.py),
      #    so no database service is needed for this step.
      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short

      # 6. Build Docker image - pipeline fails if the build fails
      - name: Build Docker image
        run: |
          docker build -t soko-bora:${{ github.sha }} .

      # Smoke test: run the built image against a real Postgres container
      # on a shared user-defined network, then confirm the app starts and
      # responds on /health.
      - name: Start Postgres for smoke test
        run: |
          docker network create smoke-net
          docker run -d --name smoke-db --network smoke-net \
            -e POSTGRES_USER=sokobora \
            -e POSTGRES_PASSWORD=sokobora_pw \
            -e POSTGRES_DB=sokobora_db \
            postgres:16-alpine
          for i in {1..10}; do
            docker exec smoke-db pg_isready -U sokobora -d sokobora_db && break
            sleep 3
          done

      - name: Smoke test Docker image
        run: |
          docker run -d -p 5000:5000 --name soko-bora-smoke --network smoke-net \
            -e DATABASE_URL=postgresql://sokobora:sokobora_pw@smoke-db:5432/sokobora_db \
            soko-bora:${{ github.sha }}
          sleep 5
          curl --fail http://localhost:5000/health
          docker stop soko-bora-smoke smoke-db
